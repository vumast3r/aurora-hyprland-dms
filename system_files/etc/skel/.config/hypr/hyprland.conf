# Default Hyprland config for the hyprland-dms image.
# Users can tweak freely — this is just a sane starting point.

monitor = , preferred, auto, 1

# Plugins (installed via RPM from solopasha/hyprland COPR)
plugin = /usr/lib64/hyprland-plugins/libhyprscroller.so
plugin = /usr/lib64/hyprland-plugins/libhyprexpo.so

# Launch DankMaterialShell and session services
exec-once = qs -c dms
exec-once = /usr/libexec/polkit-gnome-authentication-agent-1
exec-once = hypridle
exec-once = hyprpaper
exec-once = cliphist-wayland

env = XCURSOR_SIZE, 24
env = QT_QPA_PLATFORMTHEME, qt6ct

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    # Scrolling columns à la niri. Switch to `dwindle` for classic tiling.
    layout = scroller
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 6
        passes = 2
    }
}

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

gestures {
    workspace_swipe = true
    workspace_swipe_forever = true
}

plugin {
    scroller {
        column_default_width = onehalf
        focus_wrap = false
        cycle_sizes = onefourth, onethird, onehalf, twothirds, one
    }
    hyprexpo {
        columns = 3
        gap_size = 8
        bg_col = rgb(111111)
        workspace_method = center current
        enable_gesture = true
        gesture_fingers = 3
        gesture_distance = 300
        gesture_positive = true
    }
}

$mod = SUPER

bind = $mod, Return, exec, kitty
bind = $mod, Q, killactive
bind = $mod SHIFT, E, exit
bind = $mod, E, exec, thunar
bind = $mod ALT, L, exec, hyprlock
bind = $mod, Space, exec, qs -c dms ipc call spotlight toggle
bind = $mod, V, exec, qs -c dms ipc call clipboard toggle
bind = , Print, exec, grim -g "$(slurp)" - | satty --filename -

# Workspace overview (hyprexpo)
bind = $mod, O, hyprexpo:expo, toggle

# --- niri-style column navigation (hyprscroller) ---
# Focus: arrows or vim keys
bind = $mod, left,  scroller:movefocus, l
bind = $mod, right, scroller:movefocus, r
bind = $mod, up,    scroller:movefocus, u
bind = $mod, down,  scroller:movefocus, d
bind = $mod, H, scroller:movefocus, l
bind = $mod, L, scroller:movefocus, r
bind = $mod, K, scroller:movefocus, u
bind = $mod, J, scroller:movefocus, d

# Move window / column
bind = $mod SHIFT, left,  scroller:movewindow, l
bind = $mod SHIFT, right, scroller:movewindow, r
bind = $mod SHIFT, up,    scroller:movewindow, u
bind = $mod SHIFT, down,  scroller:movewindow, d
bind = $mod SHIFT, H, scroller:movewindow, l
bind = $mod SHIFT, L, scroller:movewindow, r
bind = $mod SHIFT, K, scroller:movewindow, u
bind = $mod SHIFT, J, scroller:movewindow, d

# Cycle column width through preset sizes (niri: Mod+R)
bind = $mod, R, scroller:cyclesize, next
bind = $mod SHIFT, R, scroller:cyclesize, prev

# Consume / expel: pull focused window into the column on the left,
# or push it out into a new column to the right. Mirrors niri's comma/period.
bind = $mod, comma,  scroller:admitwindow,
bind = $mod, period, scroller:expelwindow,

# Fullscreen / maximize column
bind = $mod, F, fullscreen, 1
bind = $mod SHIFT, F, fullscreen, 0

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Volume / brightness
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindle = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindle = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
