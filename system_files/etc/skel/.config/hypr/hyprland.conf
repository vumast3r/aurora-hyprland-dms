# Default Hyprland config for the hyprland-dms image.
# Users can tweak freely — this is just a sane starting point.

monitor = , preferred, auto, 1

# Launch DankMaterialShell and session services
exec-once = qs -c dms
exec-once = /usr/libexec/polkit-gnome-authentication-agent-1
exec-once = hypridle
exec-once = hyprpaper
exec-once = cliphist-wayland

env = XCURSOR_SIZE, 24
env = QT_QPA_PLATFORMTHEME, qt6ct

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    layout = dwindle
}

decoration {
    rounding = 8
    blur {
        enabled = true
        size = 6
        passes = 2
    }
}

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
    }
}

$mod = SUPER

bind = $mod, Return, exec, kitty
bind = $mod, Q, killactive
bind = $mod SHIFT, E, exit
bind = $mod, E, exec, thunar
bind = $mod, L, exec, hyprlock
bind = $mod, Space, exec, qs -c dms ipc call spotlight toggle
bind = $mod, V, exec, qs -c dms ipc call clipboard toggle
bind = , Print, exec, grim -g "$(slurp)" - | satty --filename -

# Window focus
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Volume / brightness
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindle = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindle = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
