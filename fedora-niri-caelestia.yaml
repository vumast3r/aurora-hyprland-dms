include:
  - niri-caelestia-desktop-pkgs.yaml
ref: fedora/43/${basearch}/niri-caelestia

automatic_version_prefix: "43"
mutate-os-release: "43"

rojig:
  name: fedora-niri-caelestia
  summary: "Fedora Niri Caelestia (Niri + Caelestia Shell) base image"
  license: MIT

packages:
  # Generic release package for alternative DE variants
  - fedora-release
  - fedora-release-ostree-desktop
  # Build-time packages (needed to compile niri-caelestia-shell)
  - cmake
  - ninja-build
  - gcc-c++
  - git
  - qt6-qtdeclarative-devel
  - qt6-qtbase-devel
  - pipewire-devel
  - aubio-devel

exclude-packages:
  - PackageKit-glib
  - grubby
  - tracker
  - tracker-miners

postprocess-script: postprocess-niri-caelestia.sh

repos:
  - fedora-43
  - fedora-43-updates
  - danklinux
