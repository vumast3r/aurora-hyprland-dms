include:
  - niri-caelestia-desktop-pkgs.yaml
ref: fedora/43/${basearch}/niri-caelestia

automatic_version_prefix: "43"
mutate-os-release: "43"

rojig:
  name: fedora-niri-caelestia
  summary: "Fedora Niri Caelestia (Niri + Caelestia Shell) base image"
  license: MIT

packages:
  # Generic release package for alternative DE variants
  - fedora-release
  - fedora-release-ostree-desktop
  # Build-time packages (needed to compile niri-caelestia-shell)
  - cmake
  - ninja-build
  - gcc-c++
  - git
  - qt6-qtdeclarative-devel
  - qt6-qtbase-devel
  - pipewire-devel
  - aubio-devel

exclude-packages:
  - PackageKit-glib
  - grubby
  - tracker
  - tracker-miners
  # packages removed/renamed in f43 (base list was synced for rawhide/f39)
  - adwaita-qt5
  - fedora-repos-modular
  - fros-gnome
  - iwl100-firmware
  - iwl1000-firmware
  - iwl105-firmware
  - iwl135-firmware
  - iwl2000-firmware
  - iwl2030-firmware
  - iwl3160-firmware
  - iwl3945-firmware
  - iwl4965-firmware
  - iwl5000-firmware
  - iwl5150-firmware
  - iwl6000-firmware
  - iwl6000g2a-firmware
  - iwl6000g2b-firmware
  - iwl6050-firmware
  - iwl7260-firmware
  - iwlax2xx-firmware
  - libertas-usb8388-firmware
  - xorg-x11-drv-fbdev
  - xorg-x11-drv-vesa

postprocess-script: postprocess-niri-caelestia.sh

repos:
  - fedora-43
  - fedora-43-updates
  - danklinux
