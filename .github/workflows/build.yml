name: build-image

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.gitlab-ci.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.gitlab-ci.yml'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  IMAGE_NAME: aurora-hyprland-dms
  IMAGE_REGISTRY: ghcr.io/${{ github.repository_owner }}
  FEDORA_MAJOR_VERSION: 43

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Generate tags
        id: tags
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          DATE=$(date +%Y%m%d)
          {
            echo "tags<<EOF"
            echo "${FEDORA_MAJOR_VERSION}"
            echo "${FEDORA_MAJOR_VERSION}-${DATE}"
            echo "${FEDORA_MAJOR_VERSION}-${SHA_SHORT}"
            echo "latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build image
        id: build
        uses: redhat-actions/buildah-build@v2
        with:
          containerfiles: ./Containerfile
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            FEDORA_MAJOR_VERSION=${{ env.FEDORA_MAJOR_VERSION }}
          oci: true

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        if: github.event_name != 'pull_request'
        id: push
        uses: redhat-actions/push-to-registry@v2
        with:
          image: ${{ steps.build.outputs.image }}
          tags: ${{ steps.build.outputs.tags }}
          registry: ${{ env.IMAGE_REGISTRY }}

      - name: Echo image ref
        if: github.event_name != 'pull_request'
        run: |
          echo "Pushed: ${{ steps.push.outputs.registry-paths }}"
